services:
  registry:
    image: registry:3.0.0
    container_name: docker-registry
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    expose:
      - "5000"
    volumes:
      - ./data/registry:/var/lib/registry

  app:
    build:
      context: .
    container_name: registry-manager-app
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    environment:
      SECRET_KEY: a1b2c3d4e5f678901234567890abcdef1234567890abcdef1234567890abcdef
      DEBUG: True
      DATABASE_URL: sqlite://db/registry_manager.db
      REGISTRY_URL: http://docker-registry:5000
      ADMIN_INITIAL_PASSWORD: admin@admin
    ports:
      - "30080:8000"
    volumes:
      - ./data/db:/app/db
    depends_on:
      - registry
