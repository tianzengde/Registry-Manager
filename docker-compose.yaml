services:
  registry:
    image: registry:3.0.0
    container_name: docker-registry
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    expose:
      - "5000"
    volumes:
      - ./data/registry:/var/lib/registry

  app:
    build:
      context: .
    container_name: registry-manager-app
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-sqlite://db/registry_manager.db}
      REGISTRY_URL: ${REGISTRY_URL:-http://docker-registry:5000}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-admin}
    ports:
      - "30080:8000"
    volumes:
      - ./data/db:/app/db
    depends_on:
      - registry
